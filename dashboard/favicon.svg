<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8787;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Claw body -->
  <ellipse cx="32" cy="40" rx="14" ry="18" fill="url(#clawGrad)" stroke="#d63031" stroke-width="2"/>
  
  <!-- Left pincer -->
  <path d="M 20 35 Q 12 30, 8 28 Q 6 26, 8 24 Q 10 22, 12 24 Q 16 26, 20 30 Z" 
        fill="url(#clawGrad)" stroke="#d63031" stroke-width="1.5"/>
  
  <!-- Right pincer -->
  <path d="M 44 35 Q 52 30, 56 28 Q 58 26, 56 24 Q 54 22, 52 24 Q 48 26, 44 30 Z" 
        fill="url(#clawGrad)" stroke="#d63031" stroke-width="1.5"/>
  
  <!-- Eye dots -->
  <circle cx="26" cy="35" r="2.5" fill="#2d3436"/>
  <circle cx="38" cy="35" r="2.5" fill="#2d3436"/>
  
  <!-- Eye highlights -->
  <circle cx="27" cy="34" r="1" fill="#ffffff"/>
  <circle cx="39" cy="34" r="1" fill="#ffffff"/>
  
  <!-- Shell segments -->
  <path d="M 25 45 Q 32 42, 39 45" stroke="#d63031" stroke-width="1" fill="none"/>
  <path d="M 26 50 Q 32 47, 38 50" stroke="#d63031" stroke-width="1" fill="none"/>
</svg>
